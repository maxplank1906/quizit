spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=quizit_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=quizit_db

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:create_users_table.sql,classpath:create_questions_table.sql

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.jpa.open-in-view=false
