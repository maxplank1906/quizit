<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz Result</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0f1a; color: #e2e8f0; margin: 0; }
    .container { max-width: 900px; margin: 2rem auto; padding: 1rem; }
    .summary { background: #161d2e; border: 1px solid #1e2d45; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .row { background: #111827; border: 1px solid #1e2d45; border-radius: 10px; padding: 0.8rem; margin-bottom: 0.7rem; }
    .ok { color: #22c55e; }
    .bad { color: #ef4444; }
    a { color: #7dd3fc; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="summary">
      <h2 th:text="${quizName} + ' - Result'"></h2>
      <p>Score: <strong th:text="${correct} + ' / ' + ${total}"></strong></p>
      <p>Percentage: <strong th:text="${percentage} + '%'">0%</strong></p>
      <p><a href="/student-dashboard">Back to Dashboard</a></p>
    </div>

    <div class="row" th:each="item : ${evaluated}">
      <div th:text="${item.questionText}"></div>
      <div>Selected: <strong th:text="${item.selected}"></strong></div>
      <div>Correct: <strong th:text="${item.correct}"></strong></div>
      <div th:class="${item.isCorrect} ? 'ok' : 'bad'" th:text="${item.isCorrect} ? 'Correct' : 'Incorrect'"></div>
    </div>
  </div>
</body>
</html>
