<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizIt - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --card: #161d2e;
      --border: #1e2d45;
      --accent: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: radial-gradient(circle at 20% 20%, #172554 0%, transparent 35%),
                  radial-gradient(circle at 80% 80%, #0e7490 0%, transparent 35%),
                  var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.6rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
    }

    .brand h1 span { color: var(--accent); }

    .sub {
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 1rem;
    }

    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.84rem;
    }

    .success {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #86efac;
      padding: 0.6rem 0.8rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.84rem;
    }

    .group { margin-bottom: 0.9rem; }

    label {
      display: block;
      margin-bottom: 0.35rem;
      color: #94a3b8;
      font-size: 0.8rem;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.8rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.4rem;
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .hint a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">Q</div>
      <h1>Quiz<span>It</span></h1>
    </div>

    <p class="sub">Sign in to continue.</p>

    <div class="error" th:if="${error}" th:text="${error}"></div>
  <div class="success" th:if="${success}" th:text="${success}"></div>

    <form method="post" action="/login">
      <div class="group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>
      <div class="group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <button type="submit">Login</button>
    </form>

    <div class="hint">
      New student? <a href="/register">Create account</a><br/>
      Demo users: admin@gmail.com / 1234, instructor@gmail.com / 1234, student@gmail.com / 1234
    </div>
  </div>
</body>
</html>
